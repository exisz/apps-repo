<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rollersoft App Repository</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { padding: 2rem; border-bottom: 1px solid #1e293b; }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; }
    header p { margin-top: 0.25rem; color: #94a3b8; font-size: 0.875rem; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    #status { color: #64748b; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .app-grid { display: grid; gap: 1rem; }
    .app-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; display: flex; gap: 1rem; align-items: flex-start; }
    .app-icon { width: 64px; height: 64px; border-radius: 14px; background: #334155; flex-shrink: 0; object-fit: cover; }
    .app-info { flex: 1; }
    .app-name { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; }
    .app-desc { color: #94a3b8; font-size: 0.875rem; margin-top: 0.25rem; }
    .app-meta { margin-top: 0.5rem; font-size: 0.75rem; color: #64748b; }
    .app-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.9rem; border-radius: 8px; font-size: 0.8rem; font-weight: 500; text-decoration: none; cursor: pointer; border: none; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-secondary { background: #334155; color: #cbd5e1; }
    .btn:hover { opacity: 0.85; }
    footer { text-align: center; color: #475569; font-size: 0.75rem; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>🏗️ Rollersoft App Repository</h1>
    <p>Internal app distribution — powered by <a href="https://github.com/exisz/apps-repo" style="color:#60a5fa">exisz/apps-repo</a></p>
  </header>
  <main>
    <p id="status">Loading apps…</p>
    <div class="app-grid" id="app-grid"></div>
  </main>
  <footer>
    <a href="index.json" style="color:#475569">index.json</a> · repo.rollersoft.com.au
  </footer>

  <script>
    async function load() {
      const status = document.getElementById('status');
      const grid = document.getElementById('app-grid');
      try {
        const res = await fetch('index.json');
        const data = await res.json();
        const apps = data.apps || [];
        status.textContent = `${apps.length} app(s) · updated ${new Date(data.updated_at).toLocaleDateString()}`;
        grid.innerHTML = apps.map(app => {
          const latest = (app.versions || [])[0];
          const apkHref = latest ? latest.apk : null;
          return `
            <div class="app-card">
              <img class="app-icon" src="${app.icon}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'64\\' height=\\'64\\'><rect width=\\'64\\' height=\\'64\\' rx=\\'14\\' fill=\\'%23334155\\'/><text x=\\'50%\\' y=\\'55%\\' dominant-baseline=\\'middle\\' text-anchor=\\'middle\\' font-size=\\'28\\' fill=\\'%2394a3b8\\'>📦</text></svg>'" />
              <div class="app-info">
                <div class="app-name">${app.name}</div>
                <div class="app-desc">${app.description}</div>
                <div class="app-meta">
                  ${latest ? `v${latest.versionName} (${latest.versionCode})` : 'No releases yet'}
                  · <a href="${app.source_repo}" style="color:#60a5fa" target="_blank">source</a>
                  ${app.homepage ? `· <a href="${app.homepage}" style="color:#60a5fa" target="_blank">website</a>` : ''}
                </div>
                <div class="app-actions">
                  ${apkHref ? `<a class="btn btn-primary" href="${apkHref}" download>⬇ Download APK</a>` : '<span style="color:#64748b;font-size:0.8rem">No APK yet</span>'}
                  <a class="btn btn-secondary" href="${app.source_repo}" target="_blank">GitHub</a>
                </div>
              </div>
            </div>`;
        }).join('');
      } catch (e) {
        status.textContent = 'Failed to load index.json: ' + e.message;
      }
    }
    load();
  </script>
</body>
</html>
